name: Telegram Auto Post Server

on:
  schedule:
    - cron: '*/10 * * * *' # Her 5 minutdan awtomatiki ylgar
  workflow_dispatch:

permissions:
  contents: write # GitHub-yň hat ID-sini ýatda saklamagy üçin hökmany rugsat

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Kody barlamak
        uses: actions/checkout@v3

      - name: Python gurnamak
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Gerekli Gurallary Gurnamak
        run: pip install pyTelegramBotAPI requests

      - name: Boty Işe Girizmek
        run: python bot.py

      - name: Hatyň ID-sini Ýatda Saklamak (60 gün düzgünini döwýär)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add last_msg_id.txt || true
          git commit -m "Auto-update post ID [skip ci]" || true
          git push || true
